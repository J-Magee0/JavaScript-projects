<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Drag-N-Drop Kanban Board</title>
  </head>
  <body>
    <header class="header" role="banner" aria-label="App header"></header>

    <main class="content">
      <!-- Input Row -->
      <div class="input_container" role="form" aria-label="Add a new task">
        <label for="input" class="sr-only"></label>
        <input
          type="text"
          class="input"
          id="input"
          placeholder="Input your tasks here"
          aria-label="Task description"
        />

        <label for="progress" class="sr-only"></label>
        <select id="progress" class="progress" aria-label="Task status">
          <option value="todo" selected>-- To Do --</option>
          <option value="inProgress">-- In Progress --</option>
          <option value="done">-- Done --</option>
        </select>

        <button class="addBtn" id="addBtn" aria-label="Add task">Add</button>
      </div>

      <!-- Kanban Columns -->
      <section class="cards" aria-label="Kanban board">
        <!-- To Do Column -->
        <div
          class="card"
          id="todo"
          aria-label="To Do column"
          aria-dropeffect="move"
        >
          <div class="card_title todo" role="heading" aria-level="2">
            -- To Do --
          </div>

          <!-- Example task — will be generated by JS in production -->
          <div
            class="card_content"
            draggable="true"
            aria-grabbed="false"
            data-status="todo"
          >
            <div class="card_tab">
              <span class="tabText">Example task</span>
              <div class="btn_container">
                <button
                  class="begin"
                  data-action="begin"
                  aria-label="Move to In Progress"
                >
                  Begin
                </button>
                <button
                  class="advance done"
                  data-action="done"
                  aria-label="Move to Done"
                >
                  Done
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- In Progress Column -->
        <div
          class="card"
          id="inProgress"
          aria-label="In Progress column"
          aria-dropeffect="move"
        >
          <div class="card_title inProgress" role="heading" aria-level="2">
            -- In Progress --
          </div>

          <!-- Example task -->
          <div
            class="card_content"
            draggable="true"
            aria-grabbed="false"
            data-status="inProgress"
          >
            <div class="card_tab">
              <span class="tabText">Example task</span>
              <div class="btn_container">
                <button
                  class="advance done"
                  data-action="done"
                  aria-label="Move to Done"
                >
                  Done
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Done Column -->
        <div
          class="card"
          id="done"
          aria-label="Done column"
          aria-dropeffect="move"
        >
          <div class="card_title done" role="heading" aria-level="2">
            -- Done --
          </div>

          <!-- Example task -->
          <div
            class="card_content"
            draggable="true"
            aria-grabbed="false"
            data-status="done"
          >
                <div class="card_tab">
              <span class="tabText">Example task</span>
              <div class="btn_container">
                <button
                  class="advance remove"
                  data-action="remove"
                  aria-label="Remove"
                >
                  Remove
                </button>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
